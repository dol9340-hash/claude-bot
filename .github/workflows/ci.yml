name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: dashboard

      - name: Typecheck
        run: npm run typecheck

      - name: Test (CI suite)
        run: npm run test:ci
